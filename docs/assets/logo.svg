<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="LXPack">
  <title>LXPack</title>
  <defs>
    <linearGradient id="lxpack-mark" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Package body -->
  <rect x="3" y="9" width="26" height="18" rx="3.5" fill="url(#lxpack-mark)" fill-opacity="0.95"/>

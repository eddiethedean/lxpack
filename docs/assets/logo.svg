  <path d="M3 9h26l-13 6.5L3 9Z" fill="#ffffff"/>
  <!-- LX monogram -->
  <path d="M10.5 17.5 13.5 21.5 16.5 17.5" stroke="#4338ca" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M18.5 17.5h5.5" stroke="#6366f1" stroke-width="1.75" stroke-linecap="round"/>

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  stage:
    name: Stage release packages
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package versions from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "Staging version: $VERSION"
          for pkg in packages/*/package.json; do
            npm pkg set "version=${VERSION}" --prefix "$(dirname "$pkg")"
          done

      - name: Build
        run: pnpm build

      - name: Pack npm tarballs
        run: |
          mkdir -p release
          for pkg in packages/*; do
            (cd "$pkg" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/release")
          done
          ls -la release/

      - name: Upload staged packages
        uses: actions/upload-artifact@v4
        with:
          name: lxpack-packages-${{ github.ref_name }}
          path: release/*.tgz
          retention-days: 90

      - name: Attach packages to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/*.tgz --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              release/*.tgz
          fi

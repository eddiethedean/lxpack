name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  stage:
    name: Stage release packages on npm
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for staged publishing
        run: npm install -g npm@11.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package versions from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "Staging version: $VERSION"
          for pkg in packages/*/package.json; do
            npm pkg set "version=${VERSION}" --prefix "$(dirname "$pkg")"
          done

      - name: Build
        run: pnpm build

      - name: Stage packages on npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          for pkg in validators runtime scorm cli; do
            TGZ="$GITHUB_WORKSPACE/release/lxpack-${pkg}-${VERSION}.tgz"
            (cd "packages/$pkg" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/release")
            echo "Staging $TGZ"
            npm stage publish "$TGZ" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

site_name: LXPack
site_description: Build, preview, and ship web-native training — SCORM, xAPI, and cmi5 — with AI-friendly course files.
site_url: https://lxpack.readthedocs.io/
repo_url: https://github.com/eddiethedean/lxpack
repo_name: eddiethedean/lxpack
edit_uri: edit/main/docs/

copyright: Copyright &copy; LXPack contributors — Apache-2.0

# Snippet-only and source markdown — not built as standalone pages (MkDocs 1.6+).
exclude_docs: |
  README.md
  CLI.md
  COURSE_YAML.md
  LXPACK_CONFIG.md
  TRACKING_AND_COMPLETION.md
  SPA_BRIDGE.md
  LESSONKIT_INTERCHANGE.md
  TROUBLESHOOTING.md
  LESSONKIT_INTEROPERABILITY.md
  LESSONKIT_PACKAGES.md
  LXPACK_UPGRADES_FOR_LESSONKIT.md
  LXPACK_UPGRADE_PLAN_FOR_MAINTAINERS.md
  includes/**

# Legacy: keep sources out of nav if exclude_docs is unavailable.
not_in_nav: |
  /includes/**

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.tabs.link
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs/includes
        - docs
        - .
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eddiethedean/lxpack
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@lxpack/cli
  generator: false

nav:
  - Home: index.md
  - Examples: examples/index.md
  - Guides:
      - File-based authoring:
          - guides/file-based/index.md
          - getting-started/what-you-need.md
          - getting-started/install-cli.md
          - getting-started/your-first-course.md
          - guides/build-overview.md
          - guides/course-structure.md
          - guides/writing-lessons.md
          - guides/building-interactions.md
          - guides/quizzes-and-assessments.md
          - guides/branching-and-paths.md
          - guides/preview-and-review.md
          - guides/export-to-lms.md
          - getting-started/glossary.md
      - AI-assisted authoring:
          - guides/ai-assisted/index.md
          - guides/workflow-overview.md
          - guides/workflow-claude-design.md
          - guides/workflow-cursor.md
          - guides/workflow-claude-code.md
          - guides/prompts-for-claude.md
          - guides/library-skills.md
      - LessonKit & React:
          - guides/lessonkit/index.md
          - guides/scorm-spa-recipes.md
          - guides/migrating-from-lessonkit-lxpack-adapter.md
      - Migration:
          - guides/migrating-from-legacy-tools.md
  - Reference:
      - reference/index.md
      - reference/cli.md
      - reference/course-yaml.md
      - reference/lxpack-config.md
      - reference/lesson-types.md
      - reference/components.md
      - reference/tracking-and-completion.md
      - reference/lessonkit-interoperability.md
      - reference/lessonkit-packages.md
      - reference/lessonkit-interchange.md
      - reference/spa-bridge.md
      - reference/lxpack-upgrades.md
      - reference/troubleshooting.md
  - Project:
      - project/changelog.md
      - developer/index.md
      - developer/ROADMAP.md
      - developer/api-stability.md
      - readthedocs-setup.md

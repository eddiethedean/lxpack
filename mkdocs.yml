site_name: LXPack
site_description: Build, preview, and ship web-native training — SCORM, xAPI, and cmi5 — with AI-friendly course files.
site_url: https://lxpack.readthedocs.io/
repo_url: https://github.com/eddiethedean/lxpack
repo_name: eddiethedean/lxpack
edit_uri: edit/main/docs/

copyright: Copyright &copy; LXPack contributors — Apache-2.0

# Snippet partials for pymdownx (--8<--); not standalone pages.
not_in_nav: |
  /includes/**

theme:
  name: material
  language: en
  logo: material/school-outline
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.tabs.link
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs/includes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eddiethedean/lxpack
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@lxpack/cli
  generator: false

nav:
  - Home: index.md
  - Get started:
      - getting-started/index.md
      - getting-started/what-you-need.md
      - getting-started/install-cli.md
      - getting-started/your-first-course.md
      - getting-started/glossary.md
  - Workflows:
      - guides/workflow-overview.md
      - guides/workflow-claude-design.md
      - guides/workflow-cursor.md
      - guides/workflow-claude-code.md
      - guides/lessonkit-interoperability.md
      - guides/scorm-spa-recipes.md
      - guides/migrating-from-lessonkit-lxpack-adapter.md
      - guides/migrating-from-legacy-tools.md
  - Build courses:
      - guides/build-overview.md
      - guides/course-structure.md
      - guides/writing-lessons.md
      - guides/building-interactions.md
      - guides/quizzes-and-assessments.md
      - guides/branching-and-paths.md
      - guides/preview-and-review.md
      - guides/export-to-lms.md
  - AI authoring:
      - guides/prompts-for-claude.md
      - guides/library-skills.md
  - Reference:
      - reference/index.md
      - reference/cli.md
      - reference/course-yaml.md
      - reference/lxpack-config.md
      - reference/lesson-types.md
      - reference/components.md
      - reference/tracking-and-completion.md
      - reference/lessonkit-interchange.md
      - reference/spa-bridge.md
      - reference/troubleshooting.md
  - Developer:
      - developer/index.md
      - developer/SPEC.md
      - developer/PLAN.md
      - developer/ROADMAP.md
      - developer/ARCHITECTURE.md
      - developer/REFACTORING.md
      - developer/api-stability.md
  - Maintainers:
      - readthedocs-setup.md
  - Changelog: https://github.com/eddiethedean/lxpack/blob/main/CHANGELOG.md

# Read the Docs configuration — https://docs.readthedocs.com/platform/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        # Override must write to $READTHEDOCS_OUTPUT/html (not ./site/) or RTD marks build failed
        - NO_MKDOCS_2_WARNING=1 mkdocs build --strict --clean --site-dir "$READTHEDOCS_OUTPUT/html"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: requirements-docs.txt

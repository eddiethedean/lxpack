# Read the Docs configuration — https://docs.readthedocs.com/platform/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        - NO_MKDOCS_2_WARNING=1 mkdocs build --strict

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: requirements-docs.txt
